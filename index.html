<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales Market Pulse (MVP)</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #171a21;
        --border: #2a3040;
        --text: #e8eaed;
        --muted: #9aa3b2;
        --accent: #3b82f6;
        --pos: #22c55e;
        --neg: #ef4444;
        --chip: #273149;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f5f7;
          --panel: #ffffff;
          --border: #d8dee9;
          --text: #111827;
          --muted: #5b6472;
          --chip: #e5e9f0;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      h1 {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 600;
      }
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      .filters label {
        font-size: 0.8rem;
        color: var(--muted);
      }
      select {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.35rem 0.6rem;
        font: inherit;
      }
      main {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(0, 2.25fr);
        gap: 1rem;
        padding: 1rem 1.25rem 2rem;
        max-width: 1200px;
        margin: 0 auto;
        align-items: start;
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }
      }
      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.1rem;
      }
      section h2 {
        margin: 0 0 0.75rem;
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .banner {
        margin: 0 1.25rem 0;
        max-width: 1100px;
        margin-inline: auto;
        padding: 0 1.25rem;
      }
      .banner p {
        margin: 0.75rem 0 0;
        font-size: 0.8rem;
        color: var(--muted);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.45rem 0.35rem;
        border-bottom: 1px solid var(--border);
      }
      th {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
      }
      .pct-pos {
        color: var(--pos);
        font-variant-numeric: tabular-nums;
      }
      .pct-neg {
        color: var(--neg);
        font-variant-numeric: tabular-nums;
      }
      .news-item {
        padding: 1.1rem 0;
        border-bottom: 1px solid var(--border);
      }
      .news-item:first-child {
        padding-top: 0.25rem;
      }
      .news-item:last-child {
        border-bottom: none;
        padding-bottom: 0.25rem;
      }
      .news-item h3 {
        margin: 0 0 0.35rem;
        font-size: 1.05rem;
        font-weight: 650;
        line-height: 1.35;
      }
      .article-body {
        margin: 0.65rem 0 0;
        font-size: 0.92rem;
        line-height: 1.62;
        color: var(--text);
      }
      .article-body p {
        margin: 0 0 0.65rem;
      }
      .article-body p:last-child {
        margin-bottom: 0;
      }
      .relevance-block {
        margin: 0.85rem 0 0;
        padding: 0.75rem 0.85rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        background: color-mix(in srgb, var(--accent) 8%, var(--panel));
      }
      .relevance-block h4 {
        margin: 0 0 0.5rem;
        font-size: 0.72rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 650;
      }
      .relevance-block .article-body {
        margin-top: 0;
        font-size: 0.88rem;
        line-height: 1.58;
      }
      .meta {
        font-size: 0.78rem;
        color: var(--muted);
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-top: 0.4rem;
      }
      .chip {
        font-size: 0.72rem;
        padding: 0.15rem 0.45rem;
        border-radius: 999px;
        background: var(--chip);
        color: var(--text);
      }
      .error {
        color: var(--neg);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Sales Market Pulse</h1>
      <div class="filters">
        <label for="topic">Topic</label>
        <select id="topic" aria-label="Filter news by topic">
          <option value="all">All</option>
        </select>
      </div>
    </header>
    <div class="banner">
      <p id="disclaimer"></p>
    </div>
    <main>
      <section aria-labelledby="market-heading">
        <h2 id="market-heading">Market (stub)</h2>
        <div id="market-root"></div>
      </section>
      <section aria-labelledby="news-heading">
        <h2 id="news-heading">News briefings (stub)</h2>
        <p class="meta" style="margin: -0.35rem 0 0.75rem; max-width: 52rem">
          Full context plus a <strong>Cursor sales angle</strong> on each story. Edit copy in <code>stub/news.json</code>.
        </p>
        <div id="news-root"></div>
      </section>
    </main>
    <script>
      const topicSelect = document.getElementById("topic");
      const marketRoot = document.getElementById("market-root");
      const newsRoot = document.getElementById("news-root");
      const disclaimer = document.getElementById("disclaimer");

      let marketData = null;
      let newsData = null;

      function formatTime(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleString(undefined, {
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          });
        } catch {
          return iso;
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function paragraphsHtml(field) {
        if (field == null) return "";
        const parts = Array.isArray(field) ? field : [field];
        const paras = parts.map((p) => String(p).trim()).filter(Boolean);
        if (!paras.length) return "";
        return paras.map((p) => `<p>${escapeHtml(p)}</p>`).join("");
      }

      function renderMarket() {
        if (!marketData) return;
        const rows = marketData.quotes
          .map(
            (q) => `
          <tr>
            <td><strong>${q.symbol}</strong></td>
            <td>${q.name ?? ""}</td>
            <td>${q.last?.toFixed?.(2) ?? q.last}</td>
            <td class="${q.changePct >= 0 ? "pct-pos" : "pct-neg"}">${q.changePct >= 0 ? "+" : ""}${q.changePct?.toFixed?.(2) ?? q.changePct}%</td>
          </tr>`
          )
          .join("");
        marketRoot.innerHTML = `
          <table>
            <thead><tr><th>Sym</th><th>Name</th><th>Last</th><th>Chg %</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <p class="meta" style="margin:0.5rem 0 0;font-size:0.78rem;color:var(--muted)">As of ${formatTime(marketData.asOf)}</p>`;
      }

      function allTags() {
        const set = new Set();
        (newsData?.items ?? []).forEach((i) => (i.tags ?? []).forEach((t) => set.add(t)));
        return [...set].sort();
      }

      function fillTopics() {
        const tags = allTags();
        topicSelect.innerHTML =
          `<option value="all">All</option>` +
          tags.map((t) => `<option value="${t}">${t}</option>`).join("");
      }

      function renderNews() {
        if (!newsData) return;
        const filter = topicSelect.value;
        const items = newsData.items.filter((i) => {
          if (filter === "all") return true;
          return (i.tags ?? []).includes(filter);
        });
        if (!items.length) {
          newsRoot.innerHTML = `<p class="meta">No items for this topic.</p>`;
          return;
        }
        newsRoot.innerHTML = items
          .map((i) => {
            const headline = escapeHtml(i.headline ?? "Untitled");
            const src = escapeHtml(i.source ?? "Source");
            const bodyHtml = paragraphsHtml(i.article);
            const relHtml = paragraphsHtml(i.relevance);
            const relevanceTitle = escapeHtml(i.relevanceTitle ?? "Why this matters for Cursor sales");
            const bodySection = bodyHtml
              ? `<div class="article-body">${bodyHtml}</div>`
              : `<div class="article-body"><p><em>No article body in stub data.</em></p></div>`;
            const relevanceSection = relHtml
              ? `<aside class="relevance-block" aria-label="Sales relevance"><h4>${relevanceTitle}</h4><div class="article-body">${relHtml}</div></aside>`
              : "";
            return `
          <article class="news-item">
            <h3>${headline}</h3>
            <div class="meta">${src} · ${escapeHtml(formatTime(i.publishedAt))}</div>
            <div class="chips">${(i.tags ?? [])
              .map((t) => `<span class="chip">${escapeHtml(t)}</span>`)
              .join("")}</div>
            ${bodySection}
            ${relevanceSection}
          </article>`;
          })
          .join("");
      }

      async function load() {
        try {
          const [mRes, nRes] = await Promise.all([
            fetch("./stub/market.json", { cache: "no-store" }),
            fetch("./stub/news.json", { cache: "no-store" }),
          ]);
          if (!mRes.ok || !nRes.ok) throw new Error("Failed to load stub JSON");
          marketData = await mRes.json();
          newsData = await nRes.json();
          disclaimer.textContent = [marketData.disclaimer, newsData.disclaimer].filter(Boolean).join(" ");
          fillTopics();
          renderMarket();
          renderNews();
        } catch (e) {
          marketRoot.innerHTML = `<p class="error">Could not load data. Use a local server (see README), not file://.</p>`;
          newsRoot.innerHTML = "";
          disclaimer.textContent = "";
        }
      }

      topicSelect.addEventListener("change", renderNews);
      load();
    </script>
  </body>
</html>
